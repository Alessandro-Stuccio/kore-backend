spring:
  application:
    name: kore
  # Resta attivo il profilo dev: serve ai bean annotati @Profile("dev")
  # (DevFileSeedInitializer e LogsDatabaseInitializer), non a separare le configurazioni.
  profiles:
    active: dev

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: secret

  jpa:
    hibernate:
      # Lo schema viene ricreato da zero a ogni avvio; i dati li reinserisce data.sql.
      ddl-auto: create
    # Aspetta che Hibernate crei le tabelle prima di lanciare data.sql.
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  # Avvia in automatico i container del docker-compose.yml all'avvio dell'app.
  docker:
    compose:
      enabled: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # SMTP per l'invio delle email (benvenuto, reset password, promemoria).
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:koreadministration@gmail.com}
    password: ${SMTP_PASSWORD:scgw qype mlnj xnuz}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}
          connectiontimeout: ${SMTP_CONNECTION_TIMEOUT:20000}
          timeout: ${SMTP_READ_TIMEOUT:20000}
          writetimeout: ${SMTP_WRITE_TIMEOUT:20000}

  # Broker per la consegna asincrona dei messaggi di chat.
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

file:
  upload-dir: uploads

mail:
  from: ${MAIL_FROM:koreadministration@gmail.com}

admin:
  email: koreadministration@gmail.com

jwt:
  length: 128
  expiration: 86400000

cors:
  allowed-origins: http://localhost:4200

schedule:
  time:
    subscription: 0 0 0 * * ? # Ogni giorno a mezzanotte
    bookings: 0 */5 * * * ? # Ogni 5 minuti
